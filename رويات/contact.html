<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تواصل معنا</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', 'Arial', sans-serif;
            background: #0d0d0d;
            padding: 100px 20px 40px;
            min-height: 100vh;
            color: #fff;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 999;
            background: rgba(0, 0, 0, 0.95);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #c0392b;
        }

        .navbar .logo {
            color: #c0392b;
            font-size: 1.8rem;
            font-weight: bold;
            text-decoration: none;
        }

        .navbar .logo span {
            color: #fff;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            list-style: none;
            align-items: center;
        }

        .nav-links a {
            color: #ddd;
            text-decoration: none;
            font-size: 1rem;
            transition: all 0.3s;
            padding: 8px 15px;
            border-radius: 25px;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #fff;
            background: #c0392b;
        }

        .nav-links .user-info {
            color: #c0392b;
            font-weight: bold;
            margin-right: 10px;
        }

        .nav-links .logout-btn {
            background: #c0392b;
            color: #fff;
            padding: 6px 18px;
            border-radius: 25px;
            cursor: pointer;
            border: none;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .nav-links .logout-btn:hover {
            background: #e74c3c;
            transform: scale(1.05);
        }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
        }

        .hamburger span {
            width: 28px;
            height: 3px;
            background: #fff;
            border-radius: 5px;
            transition: 0.3s;
        }

        .container {
            max-width: 700px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 50px;
        }

        .header h1 {
            font-size: 3.5rem;
            color: #c0392b;
        }

        .header .sub {
            font-size: 1.2rem;
            color: #888;
            border-bottom: 3px solid #c0392b;
            display: inline-block;
            padding-bottom: 8px;
        }

        .contact-form {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 25px;
            border: 1px solid #2a2a2a;
            box-shadow: 0 10px 40px rgba(192, 57, 43, 0.1);
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            color: #c0392b;
            font-size: 1.1rem;
            margin-bottom: 8px;
            font-weight: bold;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 14px 20px;
            border-radius: 12px;
            border: 2px solid #2a2a2a;
            background: #0d0d0d;
            color: #fff;
            font-size: 1rem;
            transition: all 0.3s;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #c0392b;
            box-shadow: 0 0 20px rgba(192, 57, 43, 0.15);
        }

        .form-group textarea {
            height: 150px;
            resize: vertical;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: #c0392b;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .submit-btn:hover {
            background: #e74c3c;
            transform: scale(1.02);
            box-shadow: 0 8px 30px rgba(192, 57, 43, 0.4);
        }

        .contact-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 40px;
            text-align: center;
        }

        .contact-info .info-item {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #2a2a2a;
            transition: all 0.3s;
        }

        .contact-info .info-item:hover {
            border-color: #c0392b;
            transform: translateY(-5px);
        }

        .contact-info .info-item .icon {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .contact-info .info-item .label {
            color: #888;
            font-size: 0.9rem;
        }

        .contact-info .info-item .value {
            color: #fff;
            font-size: 1rem;
            font-weight: bold;
        }

        .back-btn {
            display: inline-block;
            margin-top: 40px;
            padding: 15px 45px;
            background: #c0392b;
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.2rem;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: #e74c3c;
            transform: scale(1.03);
        }

        .text-center {
            text-align: center;
        }

        .footer-note {
            text-align: center;
            margin-top: 30px;
            color: #555;
            font-size: 0.9rem;
            border-top: 1px solid #222;
            padding-top: 20px;
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 12px 20px;
                flex-wrap: wrap;
            }

            .nav-links {
                display: none;
                width: 100%;
                flex-direction: column;
                text-align: center;
                padding: 15px 0;
                gap: 10px;
            }

            .nav-links.open {
                display: flex;
            }

            .hamburger {
                display: flex;
            }

            body {
                padding: 80px 15px 30px;
            }

            .header h1 {
                font-size: 2.5rem;
            }

            .contact-form {
                padding: 25px;
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #c0392b;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo">📖 <span>عالم</span> الروايات</a>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html">🏠 الرئيسية</a></li>
            <li><a href="books.html">📚 الكتب</a></li>
            <li><a href="contact.html" class="active">📞 تواصل معنا</a></li>
            <li id="authLinks">
                <a href="login.html">🔑 تسجيل دخول</a>
                <a href="register.html">📝 إنشاء حساب</a>
            </li>
            <li id="userSection" style="display: none;">
                <span class="user-info" id="userNameDisplay">👤</span>
                <button class="logout-btn" onclick="logout()">🚪 تسجيل خروج</button>
            </li>
        </ul>
        <div class="hamburger" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <div class="container">
        <div class="header">
            <h1>📞 تواصل معنا</h1>
            <span class="sub">نحن هنا لخدمتك</span>
        </div>

        <div class="contact-form">
            <form id="contactForm" onsubmit="return sendMessage()">
                <div class="form-group">
                    <label>👤 الاسم</label>
                    <input type="text" placeholder="أدخل اسمك" required />
                </div>
                <div class="form-group">
                    <label>📧 البريد الإلكتروني</label>
                    <input type="email" placeholder="أدخل بريدك الإلكتروني" required />
                </div>
                <div class="form-group">
                    <label>📝 الموضوع</label>
                    <input type="text" placeholder="عنوان الرسالة" required />
                </div>
                <div class="form-group">
                    <label>💬 الرسالة</label>
                    <textarea placeholder="اكتب رسالتك هنا..." required></textarea>
                </div>
                <button type="submit" class="submit-btn">📤 إرسال الرسالة</button>
            </form>
        </div>

        <div class="contact-info">
            <div class="info-item">
                <div class="icon">📍</div>
                <div class="label">العنوان</div>
                <div class="value">اليمن     صنعاء</div>
            </div>
            <div class="info-item">
                <div class="icon">📧</div>
                <div class="label">البريد الإلكتروني</div>
                <div class="value">jahedmohmmed77@gmail.com</div>
            </div>
            <div class="info-item">
                <div class="icon">📱</div>
                <div class="label">الهاتف</div>
                <div class="value">+967 777777777</div>
            </div>
        </div>

        <div class="text-center">
            <a href="index.html" class="back-btn">🏠 العودة للرئيسية</a>
        </div>

        <div class="footer-note">
            💡 جميع الحقوق محفوظة © 2026 - عالم الروايات
        </div>
    </div>

    <script>
        function toggleMenu() {
            document.getElementById('navLinks').classList.toggle('open');
        }

        function sendMessage() {
            alert('✅ تم إرسال رسالتك بنجاح! سنتواصل معك قريباً.');
            document.getElementById('contactForm').reset();
            return false;
        }

        document.addEventListener('DOMContentLoaded', function() {
            const currentUser = localStorage.getItem('currentUser');
            const authLinks = document.getElementById('authLinks');
            const userSection = document.getElementById('userSection');
            const userNameDisplay = document.getElementById('userNameDisplay');

            if (currentUser) {
                authLinks.style.display = 'none';
                userSection.style.display = 'flex';
                userNameDisplay.textContent = '👤 ' + currentUser;
            } else {
                authLinks.style.display = 'flex';
                userSection.style.display = 'none';
            }
        });

        function logout() {
            localStorage.removeItem('currentUser');
            location.reload();
        }
    </script>

</body>
</html>
