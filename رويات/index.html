<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>عالم الروايات</title>
    <style>
        /* ====== إعادة ضبط ====== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            width: 100%;
            height: 100%;
            font-family: 'Tajawal', 'Arial', sans-serif;
        }

        /* ====== القائمة العلوية ====== */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 999;
            background: rgba(0, 0, 0, 0.95);
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 3px solid #c0392b;
            backdrop-filter: blur(10px);
        }

        .navbar .logo {
            color: #c0392b;
            font-size: 1.8rem;
            font-weight: bold;
            text-decoration: none;
        }

        .navbar .logo span {
            color: #fff;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            list-style: none;
            align-items: center;
        }

        .nav-links a {
            color: #ddd;
            text-decoration: none;
            font-size: 1rem;
            transition: all 0.3s;
            padding: 8px 15px;
            border-radius: 25px;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: #fff;
            background: #c0392b;
        }

        .nav-links .user-info {
            color: #c0392b;
            font-weight: bold;
            margin-right: 10px;
        }

        .nav-links .logout-btn {
            background: #c0392b;
            color: #fff;
            padding: 6px 18px;
            border-radius: 25px;
            cursor: pointer;
            border: none;
            font-size: 0.9rem;
            transition: all 0.3s;
        }

        .nav-links .logout-btn:hover {
            background: #e74c3c;
            transform: scale(1.05);
        }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            gap: 5px;
        }

        .hamburger span {
            width: 28px;
            height: 3px;
            background: #fff;
            border-radius: 5px;
            transition: 0.3s;
        }

        /* ====== القسم الرئيسي ====== */
        .hero {
            width: 100%;
            min-height: 100vh;
            background: url('61e58e6ae8abeb34c21a4b3af01c4a61.jpg') no-repeat center center fixed;
            background-size: cover ;
            display: flex ;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.65);
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            color: #fff;
            padding: 20px;
            margin-top: 60px;
        }

        .content h1 {
            font-size: 4.8rem;
            margin-bottom: 15px;
            letter-spacing: 3px;
        }

        .content h1 .red {
            color: #c0392b;
        }

        .content h1 .white {
            color: #fff;
        }

        .content p {
            font-size: 1.6rem;
            margin-bottom: 40px;
            color: #ddd;
        }

        .btn {
            display: inline-block;
            padding: 20px 60px;
            background: #c0392b;
            color: #fff;
            font-size: 1.8rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 60px;
            transition: all 0.3s ease;
            box-shadow: 0 8px 30px rgba(192, 57, 43, 0.5);
            border: 2px solid #c0392b;
            animation: pulse 2s infinite;
        }

        .btn:hover {
            transform: scale(1.08);
            background: #fff;
            color: #c0392b;
            box-shadow: 0 15px 40px rgba(192, 57, 43, 0.7);
        }

        @keyframes pulse {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.03);
            }
            100% {
                transform: scale(1);
            }
        }

        /* ====== تنسيق الجوال ====== */
        @media (max-width: 768px) {
            .navbar {
                padding: 12px 20px;
                flex-wrap: wrap;
            }

            .nav-links {
                display: none;
                width: 100%;
                flex-direction: column;
                text-align: center;
                padding: 15px 0;
                gap: 10px;
            }

            .nav-links.open {
                display: flex;
            }

            .hamburger {
                display: flex;
            }

            .content h1 {
                font-size: 2.8rem;
            }
            .content p {
                font-size: 1.2rem;
            }
            .btn {
                font-size: 1.4rem;
                padding: 15px 40px;
            }
        }

        /* ====== شريط التمرير ====== */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }
        ::-webkit-scrollbar-thumb {
            background: #c0392b;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <!-- ====== القائمة العلوية ====== -->
    <nav class="navbar">
        <a href="index.html" class="logo">📖 <span>عالم</span> الروايات</a>
        <ul class="nav-links" id="navLinks">
            <li><a href="index.html" class="active">🏠 الرئيسية</a></li>
            <li><a href="books.html">📚 الكتب</a></li>
            <li><a href="contact.html">📞 تواصل معنا</a></li>
            <li id="authLinks">
                <a href="login.html">🔑 تسجيل دخول</a>
                <a href="register.html">📝 إنشاء حساب</a>
            </li>
            <li id="userSection" style="display: none;">
                <span class="user-info" id="userNameDisplay">👤</span>
                <button class="logout-btn" onclick="logout()">🚪 تسجيل خروج</button>
            </li>
        </ul>
        <div class="hamburger" onclick="toggleMenu()">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <!-- ====== المحتوى الرئيسي ====== -->
    <section class="hero">
        <div class="content">
            <h1><span class="red">عالم</span> <span class="white">الروايات</span></h1>
            <p>اكتشف عوالم مليئة بالتشويق والإثارة</p>
            <a href="books.html" class="btn">📖 استكشف الكتب</a>
        </div>
    </section>

    <script>
        // ====== القائمة ======
        function toggleMenu() {
            document.getElementById('navLinks').classList.toggle('open');
        }

        // ====== التحقق من حالة تسجيل الدخول ======
        document.addEventListener('DOMContentLoaded', function() {
            const currentUser = localStorage.getItem('currentUser');
            const authLinks = document.getElementById('authLinks');
            const userSection = document.getElementById('userSection');
            const userNameDisplay = document.getElementById('userNameDisplay');

            if (currentUser) {
                authLinks.style.display = 'none';
                userSection.style.display = 'flex';
                userNameDisplay.textContent = '👤 ' + currentUser;
            } else {
                authLinks.style.display = 'flex';
                userSection.style.display = 'none';
            }
        });

        function logout() {
            localStorage.removeItem('currentUser');
            location.reload();
        }
    </script>

</body>
</html>
